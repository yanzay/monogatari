name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: npm ci

      - name: Build derived data artifacts (manifest pages, vocab shards, grammar examples)
        run: |
          set -eu
          python3 pipeline/build_manifest.py
          python3 pipeline/build_grammar_examples.py
          python3 pipeline/build_vocab_shards.py
          ls -la stories/index/ | head
          ls -la data/vocab/ | head
          ls -la data/vocab/shards/ | wc -l

      - name: Resolve symlinks in static/ (GH Pages won't follow them)
        run: |
          set -eu
          # Symlinks point from static/<x> -> ../<x> (i.e. repo root). Replace
          # each symlink with a real copy of its target so the built site is
          # fully self-contained and Pages can serve every asset.
          for name in data stories audio legacy; do
            link="static/$name"
            if [ -L "$link" ]; then
              resolved="$(readlink -f "$link")"
              echo "Resolving $link -> $resolved"
              rm "$link"
              cp -R "$resolved" "$link"
            fi
          done
          du -sh static/* | sort -h
          ls -la static/

      - name: Run unit tests
        run: npm run test:unit

      - name: Build
        run: npm run build

      - name: Inject 404.html (mirror of index.html for hash router fallback)
        run: cp build/index.html build/404.html || true

      - name: Add .nojekyll
        run: touch build/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
