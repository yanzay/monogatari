<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Monogatari — a graded Japanese reader with click-to-lookup vocab, integrated SRS, and per-token audio." />
    <meta name="theme-color" content="#c0392b" />
    <!--
      Icon discovery for the install/home-screen UX. The PWA manifest
      icon array (vite.config.ts) covers Android + Chrome desktop. iOS
      Safari ignores the manifest's icons and instead reads
      <link rel="apple-touch-icon">; without it, "Add to Home Screen"
      uses a screenshot of the page (ugly). The 32x32 favicon falls
      out of icon-192 via browser scaling. All icons live under
      static/icons/ and are generated by scripts/generate_pwa_icons.py.
    -->
    <link rel="icon" type="image/png" href="%sveltekit.assets%/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="%sveltekit.assets%/icons/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Fraunces:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    %sveltekit.head%
    <title>Monogatari</title>
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
